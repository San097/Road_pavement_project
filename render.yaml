services:
  - type: web
    name: road-pavement-project
    runtime: python
    pythonVersion: 3.11.9
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn app:app
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
