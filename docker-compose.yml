version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10000:10000"
    environment:
      PORT: 10000
      FLASK_SECRET_KEY: dev-secret-key-change-in-production
      SESSION_COOKIE_SECURE: "0"
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
      - ./uploads_test:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:10000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
