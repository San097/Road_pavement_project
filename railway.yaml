services:
  - type: web
    name: road-pavement-railway
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: cd road_pavement_project && gunicorn --bind 0.0.0.0:$PORT --workers 2 --timeout 60 app:app
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: "3.10"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: DATA_DIR
        value: /var/data
