<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: "Space Grotesk", sans-serif; }
body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background:
        radial-gradient(circle at 12% 10%, rgba(29, 211, 255, 0.22), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(0, 230, 169, 0.16), transparent 30%),
        linear-gradient(145deg, #01060f 0%, #021124 55%, #020814 100%);
    color: #ddfbff;
}
.card {
    width: 100%;
    max-width: 520px;
    background: rgba(6, 18, 32, 0.9);
    border: 1px solid rgba(34, 211, 238, 0.3);
    border-radius: 22px;
    box-shadow: 0 24px 70px rgba(2, 6, 23, 0.45);
    padding: 32px;
    backdrop-filter: blur(8px);
}
h1 { font-size: 31px; margin-bottom: 8px; text-align: center; color: #f8fafc; }
.sub { color: #a8d5df; text-align: center; margin-bottom: 22px; line-height: 1.6; }
.msg {
    margin-bottom: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
}
.msg.error { background: rgba(239, 68, 68, 0.18); color: #fecaca; border: 1px solid rgba(239, 68, 68, 0.24); }
.msg.info { background: rgba(0, 230, 169, 0.16); color: #c7f9ed; border: 1px solid rgba(0, 230, 169, 0.24); }
.field { margin-bottom: 16px; }
label { display: block; margin-bottom: 8px; font-weight: 600; }
input {
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    border: 1px solid rgba(34, 211, 238, 0.34);
    color: #e6fbff;
    background: rgba(5, 20, 34, 0.84);
}
input:focus {
    outline: none;
    border-color: #22d3ee;
    box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.22);
}
button {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 13px;
    margin-top: 4px;
    background: linear-gradient(135deg, #1dd3ff 0%, #00e6a9 100%);
    color: #03242e;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
}
button:hover { box-shadow: 0 10px 24px rgba(0, 230, 169, 0.35); }
.footer {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 18px;
}
.footer a {
    color: #74ebff;
    text-decoration: none;
    font-weight: 600;
}
.footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
    <h1>Reset Your Password</h1>
    <p class="sub">Enter your username or email. If the account exists, a reset link will be sent to that account&rsquo;s email address.</p>

    {% if error %}<div class="msg error">{{ error }}</div>{% endif %}
    {% if info %}<div class="msg info">{{ info }}</div>{% endif %}

    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="field">
            <label for="identifier">Username or Email</label>
            <input id="identifier" type="text" name="identifier" placeholder="Enter your username or email" required>
        </div>
        <button type="submit">Send reset link</button>
    </form>

    <div class="footer">
        <a href="{{ url_for('login_page') }}">Back to Login</a>
        <a href="{{ url_for('register') }}">Create Account</a>
    </div>
</div>
</body>
</html>
